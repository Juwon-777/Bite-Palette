<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제휴 문의 | LuckoPick</title>
  <meta name="description" content="LuckoPick 제휴, 광고, 파트너십 문의 페이지입니다.">
  <meta name="google-adsense-account" content="ca-pub-3804672818794916">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3804672818794916"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SM1YN5XKP8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SM1YN5XKP8');

  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vy3mcishpa");
  </script>
  <style>
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-color);
      opacity: 0.8;
      margin-bottom: 7px;
    }
    label .required { color: #f7b731; margin-left: 3px; }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--round-btn-bg);
      border: 1px solid var(--round-btn-border);
      border-radius: 10px;
      color: var(--text-color);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    input:focus, select:focus, textarea:focus {
      border-color: #a29bfe;
      background: rgba(162,155,254,0.08);
    }
    select option { background: #1a1a2e; color: #fff; }
    textarea { resize: vertical; min-height: 120px; }
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 6px 20px rgba(108,92,231,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,92,231,0.5); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .success-msg {
      display: none;
      background: rgba(102,187,106,0.15);
      border: 1px solid rgba(102,187,106,0.4);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      color: #a5d6a7;
      margin-top: 16px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .success-msg.show { display: block; }
    .notice {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">🍀 LuckoPick</a>
      <div class="nav-links">
        <a href="index.html">번호 생성</a>
        <a href="about.html">소개</a>
        <a href="contact.html" class="active">제휴 문의</a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙</button>
    </div>
  </nav>

  <div class="container">
    <header class="hero">
      <h1>🤝 제휴 문의</h1>
      <p class="subtitle">파트너십 및 광고 문의는 아래 양식을 작성해 주세요.</p>
    </header>

    <div class="card">
      <form id="contactForm" action="https://formspree.io/f/xyknognn" method="POST">

        <div class="form-group">
          <label>담당자 이름 <span class="required">*</span></label>
          <input type="text" name="name" placeholder="홍길동" required>
        </div>

        <div class="form-group">
          <label>이메일 <span class="required">*</span></label>
          <input type="email" name="email" placeholder="example@company.com" required>
        </div>

        <div class="form-group">
          <label>회사 / 브랜드명</label>
          <input type="text" name="company" placeholder="(주)회사명">
        </div>

        <div class="form-group">
          <label>연락처</label>
          <input type="tel" name="phone" placeholder="010-0000-0000">
        </div>

        <div class="form-group">
          <label>문의 유형 <span class="required">*</span></label>
          <select name="type" required>
            <option value="" disabled selected>선택해 주세요</option>
            <option value="광고/스폰서십">광고 / 스폰서십</option>
            <option value="콘텐츠 제휴">콘텐츠 제휴</option>
            <option value="입점/등록 제안">입점 / 등록 제안</option>
            <option value="공동 마케팅">공동 마케팅</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label>문의 내용 <span class="required">*</span></label>
          <textarea name="message" placeholder="제휴 목적, 제안 내용, 예산 등을 자유롭게 작성해 주세요." required></textarea>
        </div>

        <input type="text" name="_gotcha" style="display:none">
        <input type="hidden" name="_subject" value="[LuckoPick] 새 제휴 문의가 도착했습니다">

        <button type="submit" class="submit-btn" id="submitBtn">문의 보내기 ✉️</button>
      </form>

      <div class="success-msg" id="successMsg">
        ✅ 문의가 성공적으로 전송되었습니다!<br>
        빠른 시일 내에 답변 드리겠습니다.
      </div>

      <p class="notice">보내주신 정보는 제휴 검토 목적으로만 사용되며 제3자에게 제공되지 않습니다.</p>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="about.html">서비스 소개</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="contact.html">제휴 문의</a>
      </div>
      <p class="footer-copy">© 2024 LuckoPick. 본 사이트는 오락 목적으로 제공되며, 과도한 복권 구매를 권장하지 않습니다.</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '전송 중...';
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          form.style.display = 'none';
          successMsg.classList.add('show');
        } else {
          alert('전송에 실패했습니다. 잠시 후 다시 시도해 주세요.');
          submitBtn.disabled = false;
          submitBtn.textContent = '문의 보내기 ✉️';
        }
      } catch {
        alert('네트워크 오류가 발생했습니다.');
        submitBtn.disabled = false;
        submitBtn.textContent = '문의 보내기 ✉️';
      }
    });
  </script>
</body>
</html>
