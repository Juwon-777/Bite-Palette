<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로또 번호 생성기</title>
  <link rel="stylesheet" href="style.css">
  <meta name="google-adsense-account" content="ca-pub-3804672818794916">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3804672818794916"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div></div>
        <h1>🍀 로또 번호 생성기</h1>
        <button id="themeToggle" class="theme-toggle" aria-label="테마 전환">🌙</button>
      </div>
      <p class="subtitle">행운의 번호를 뽑아보세요!</p>
    </header>

    <div class="card main-card">
      <div class="round-select">
        <label for="roundCount">생성 게임 수</label>
        <div class="round-buttons">
          <button class="round-btn active" data-count="1">1게임</button>
          <button class="round-btn" data-count="3">3게임</button>
          <button class="round-btn" data-count="5">5게임</button>
        </div>
      </div>

      <div id="result-area"></div>

      <button id="generateBtn" class="generate-btn">
        <span class="btn-icon">✨</span> 번호 생성하기
      </button>
    </div>

    <div class="card history-card">
      <div class="history-header">
        <h2>저장된 번호</h2>
        <button id="clearBtn" class="clear-btn">전체 삭제</button>
      </div>
      <div id="historyArea">
        <p class="empty-msg">아직 저장된 번호가 없습니다.</p>
      </div>
    </div>

    <div class="contact-link">
      <a href="contact.html" class="contact-btn">🤝 제휴 문의하기</a>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="ball ball-yellow">1</span> 1~10</span>
      <span class="legend-item"><span class="ball ball-blue">11</span> 11~20</span>
      <span class="legend-item"><span class="ball ball-red">21</span> 21~30</span>
      <span class="legend-item"><span class="ball ball-gray">31</span> 31~40</span>
      <span class="legend-item"><span class="ball ball-green">41</span> 41~45</span>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
